name: Playwright (Visual + A11y)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Preview URL to test against"
        required: false

jobs:
  e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.base_url || vars.LOVABLE_PREVIEW_URL || 'https://id-preview--87014af9-f373-4dbd-bd76-040fa2668684.lovable.app' }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Wait for preview to be reachable
        run: |
          for i in {1..30}; do
            if curl -sfI "$PLAYWRIGHT_BASE_URL" > /dev/null; then
              echo "Preview is up"; exit 0
            fi
            echo "Waiting for $PLAYWRIGHT_BASE_URL ..."; sleep 5
          done
          echo "Preview never became reachable" >&2; exit 1

      - name: Run Playwright tests
        run: bunx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14

      - name: Upload visual diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          retention-days: 14