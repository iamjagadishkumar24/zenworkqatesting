name: Playwright (Visual + A11y)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Preview URL to test against"
        required: false

jobs:
  e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.base_url || vars.LOVABLE_PREVIEW_URL || 'https://id-preview--87014af9-f373-4dbd-bd76-040fa2668684.lovable.app' }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium firefox webkit

      - name: Wait for preview to be reachable
        run: |
          for i in {1..30}; do
            if curl -sfI "$PLAYWRIGHT_BASE_URL" > /dev/null; then
              echo "Preview is up"; exit 0
            fi
            echo "Waiting for $PLAYWRIGHT_BASE_URL ..."; sleep 5
          done
          echo "Preview never became reachable" >&2; exit 1

      - name: Run Playwright tests
        run: bunx playwright test

      - name: 990 schedules regression (validation + rendering gate)
        id: schedules_990
        env:
          PLAYWRIGHT_AGENT_EMAIL: ${{ secrets.PLAYWRIGHT_AGENT_EMAIL }}
          PLAYWRIGHT_AGENT_PASSWORD: ${{ secrets.PLAYWRIGHT_AGENT_PASSWORD }}
        run: |
          if [ -z "$PLAYWRIGHT_AGENT_EMAIL" ] || [ -z "$PLAYWRIGHT_AGENT_PASSWORD" ]; then
            echo "::error::PLAYWRIGHT_AGENT_EMAIL / PLAYWRIGHT_AGENT_PASSWORD secrets are required to gate 990 schedules"
            exit 1
          fi
          set -o pipefail
          mkdir -p test-results
          bunx playwright test e2e/990-schedules.spec.ts \
            --retries=3 \
            --trace=retain-on-failure \
            --output=test-results/990-schedules \
            --reporter=list,html 2>&1 | tee test-results/990-schedules.log

      - name: Upload 990 schedules HTML report
        if: always() && steps.schedules_990.conclusion != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-990-schedules
          path: playwright-report
          retention-days: 14

      - name: Upload 990 schedules failure artifacts (screenshots, traces, video)
        if: failure() && steps.schedules_990.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failures-990-schedules
          path: |
            test-results/990-schedules
            test-results/990-schedules.log
          retention-days: 14

      - name: Dashboard hook-order regression (React #310 gate)
        id: dashboard_hook_order
        run: |
          set -o pipefail
          mkdir -p test-results
          bunx playwright test e2e/dashboard-hook-order.spec.ts \
            --reporter=list 2>&1 | tee test-results/dashboard-hook-order.log
          if grep -E "Minified React error #310|hooks than during the previous render|rendered more hooks" \
               test-results/dashboard-hook-order.log; then
            echo "::error::React #310 / hook-order mismatch detected on /dashboard"
            exit 1
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14

      - name: Upload visual diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          retention-days: 14
